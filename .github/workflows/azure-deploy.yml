name: Build PhotoSphere Containers

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  BACKEND_IMAGE_NAME: photosphere-backend
  FRONTEND_IMAGE_NAME: photosphere-frontend
  GATEWAY_IMAGE_NAME: photosphere-gateway

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.BACKEND_IMAGE_NAME }}:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            VITE_API_URL=/api
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.FRONTEND_IMAGE_NAME }}:latest

      - name: Build and push gateway image
        uses: docker/build-push-action@v6
        with:
          context: ./gateway
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.GATEWAY_IMAGE_NAME }}:latest
