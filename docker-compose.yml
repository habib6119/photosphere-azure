services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    command: ["--bind_ip_all"]
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - mongo_data:/data/db
    networks:
      - backend-net

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    volumes:
      - redis_data:/data
    networks:
      - backend-net

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - backend-net

  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin123 &&
      mc mb --ignore-existing local/photosphere-media &&
      mc anonymous set download local/photosphere-media
      "
    networks:
      - backend-net

  api:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/photosphere
      JWT_SECRET: supersecretjwtkey
      CLIENT_URL: http://localhost,http://localhost:8080
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: photosphere-media
      STORAGE_PUBLIC_BASE_URL: http://localhost:9000/photosphere-media
      SEED_CREATOR_EMAIL: creator@photosphere.local
      SEED_CREATOR_PASSWORD: password123
      SEED_CONSUMER_EMAIL: consumer@photosphere.local
      SEED_CONSUMER_PASSWORD: password123
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    expose:
      - "5000"
    deploy:
      replicas: 3
    networks:
      - backend-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - edge-net

  gateway:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - api
    ports:
      - "8080:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - edge-net
      - backend-net

volumes:
  mongo_data:
  redis_data:
  minio_data:

networks:
  edge-net:
  backend-net:
